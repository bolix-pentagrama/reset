<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #060d1a;
    --surface:   #0b1628;
    --surface2:  #111f35;
    --border:    #1e3050;
    --border2:   #2a4268;
    --text:      #cdd9ee;
    --muted:     #5a7499;
    --accent:    #503294;
    --accent2:   #382464;
    --brand:     #a8cc3a;
    --brand-dk:  #87a72e;
    --green:     #34d399;
    --yellow:    #fbbf24;
    --red:       #f87171;
    --blue:      #3b82f6;
    --font-main: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-main); background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1320px; margin: 0 auto; padding: 18px 28px; display: flex; align-items: center; flex-wrap: wrap; gap: 16px; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .header-badge { background: var(--brand); color: #2b1547; font-family: var(--font-mono); font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 6px; letter-spacing: .05em; }
  header h1 { font-size: 18px; font-weight: 600; color: #e8f0fe; }
  header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface2); color: var(--text); font-family: var(--font-main); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn:hover { border-color: var(--accent); color: #fff; }

  .container { max-width: 1320px; margin: 0 auto; padding: 24px 28px 60px; }
  h2 { font-size: 14px; font-weight: 700; color: var(--brand); text-transform: uppercase; letter-spacing: .07em; margin: 18px 0 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(168,204,58,.2); }

  .summary { display: grid; grid-template-columns: repeat(4, minmax(180px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .summary-card strong { display: block; font-size: 18px; font-family: var(--font-mono); color: #e8f0fe; font-weight: 600; }
  .summary-card span { display: block; color: var(--muted); font-size: 11px; margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }

  .unit-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .unit-box { text-align: center; }
  .unit-btn {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font-main);
    text-transform: uppercase;
    letter-spacing: .07em;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .unit-btn::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 3px; width: 100%;
    background: linear-gradient(90deg, var(--accent), var(--brand));
    transform: scaleX(0); transform-origin: left;
    transition: transform .25s;
  }
  .unit-btn:hover::before, .unit-btn.active::before { transform: scaleX(1); }
  .unit-btn:hover { border-color: var(--accent); background: var(--surface2); }
  .unit-btn.active { background: var(--surface2); border-color: var(--accent); color: #fff; box-shadow: 0 6px 18px rgba(80,50,148,.25); }
  .unit-stats { margin-top: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .unit-stats strong { color: var(--brand); font-size: 13px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-top: 16px; }
  .panel h2 { margin: 0 0 8px; font-size: 16px; color: #e8f0fe; text-transform: none; letter-spacing: 0; border: none; padding: 0; }
  .panel > p { color: var(--muted); margin-bottom: 14px; font-size: 12px; }
  .hidden { display: none; }

  .action-list { display: grid; gap: 10px; margin-top: 16px; }
  .action-btn {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    text-align: left;
    background: var(--surface2);
    padding: 14px 18px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #e8f0fe;
    cursor: pointer;
    transition: all .2s;
    font-family: var(--font-main);
    font-size: 13px;
  }
  .action-btn:hover { background: rgba(80,50,148,.10); border-color: var(--accent); transform: translateX(2px); }
  .action-btn-title { flex: 1; min-width: 0; line-height: 1.4; }
  .action-meta-side { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .action-meta-side small { color: var(--muted); font-family: var(--font-mono); font-size: 11px; }
  .action-meta-side .pill {
    padding: 3px 10px;
    border-radius: 99px;
    background: rgba(168,204,58,.10);
    color: var(--brand);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    border: 1px solid rgba(168,204,58,.3);
  }

  .action-card {
    margin-top: 10px;
    padding: 22px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(80,50,148,.15);
  }
  .action-header {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .action-title { margin: 0; font-size: 16px; font-weight: 600; color: #e8f0fe; max-width: 70%; }
  .badge {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    height: fit-content;
    text-transform: uppercase;
    letter-spacing: .06em;
    background: rgba(251,191,36,.15);
    color: var(--yellow);
    border: 1px solid rgba(251,191,36,.4);
  }
  .meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    color: var(--text);
    font-size: 12px;
    margin-bottom: 16px;
    padding: 14px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .meta-item .lbl {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--brand);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .meta-item .val {
    display: block;
    font-size: 13px;
    color: #e8f0fe;
    font-family: var(--font-mono);
    font-weight: 600;
  }

  /* Tabela de melhorias */
  .melhorias-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin: 18px 0 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(168,204,58,.2);
  }
  .melhorias-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .melhorias-table thead th {
    background: var(--surface2);
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
  }
  .melhorias-table tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.5;
    color: var(--text);
  }
  .melhorias-table tbody tr:last-child td { border-bottom: none; }
  .melhorias-table tbody tr:hover { background: rgba(80,50,148,.05); }
  .melhorias-table tbody tr.linha-selecionada { background: rgba(168,204,58,.10); }
  .melhorias-table tbody tr.linha-selecionada:hover { background: rgba(168,204,58,.14); }
  .melhorias-table .col-select { width: 44px; text-align: center; vertical-align: middle; }
  .melhorias-table .col-select input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--brand);
    cursor: pointer;
  }
  .melhorias-table .col-id { font-family: var(--font-mono); color: var(--muted); width: 50px; font-size: 11px; }
  .melhorias-table .col-date { font-family: var(--font-mono); color: var(--text); white-space: nowrap; font-size: 11px; }
  .melhorias-table .col-prazo { text-align: center; font-family: var(--font-mono); font-size: 11px; color: var(--brand); }
  .status-tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .status-tag.naoiniciada { background: rgba(251,191,36,.10); color: var(--yellow); border: 1px solid rgba(251,191,36,.3); }
  .status-tag.emandamento { background: rgba(59,130,246,.10); color: var(--blue); border: 1px solid rgba(59,130,246,.3); }
  .status-tag.concluida   { background: rgba(168,204,58,.10); color: var(--brand); border: 1px solid rgba(168,204,58,.3); }
  .status-tag.emrisco     { background: rgba(248,113,113,.10); color: var(--red); border: 1px solid rgba(248,113,113,.3); }

  @media (max-width: 900px) {
    .summary { grid-template-columns: 1fr 1fr; }
    .unit-buttons { grid-template-columns: 1fr 1fr; }
    .header-inner { padding: 14px 16px; }
    .container { padding: 16px 14px 40px; }
    .meta { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .summary, .unit-buttons { grid-template-columns: 1fr; }
    h1 { font-size: 16px; }
    .action-btn { flex-direction: column; align-items: flex-start; gap: 10px; }
    .action-meta-side { width: 100%; justify-content: flex-start; }
    .meta { grid-template-columns: 1fr; }
    .melhorias-table { font-size: 11px; }
    .melhorias-table thead { display: none; }
    .melhorias-table tbody tr { display: block; padding: 12px; border-bottom: 1px solid var(--border); }
    .melhorias-table tbody td { display: block; border: none; padding: 4px 0; }
    .melhorias-table tbody td.col-select::before { content: 'Selecionar: '; color: var(--muted); margin-right: 8px; }
    .melhorias-table tbody td.col-id::before { content: 'ID: '; color: var(--muted); }
    .melhorias-table tbody td.col-date::before { content: attr(data-label) ': '; color: var(--muted); }
    .melhorias-table tbody td.col-prazo::before { content: 'Prazo: '; color: var(--muted); }
  }
</style>
</head>

  const unitMap = {
    'Grande ABC':     { key: 'abc',        cor: '#34d399' },
    'Pátio Paulista': { key: 'patio',      cor: '#3b82f6' },
    'Interlagos':     { key: 'interlagos', cor: '#f59e0b' },
    'Guarulhos':      { key: 'guarulhos',  cor: '#a855f7' }
  };

  function statusClass(s) {
    return s.toLowerCase().replace(/\s+/g, '').replace(/[áàâ]/g,'a').replace(/[éê]/g,'e').replace(/[í]/g,'i').replace(/[óôõ]/g,'o').replace(/[ú]/g,'u').replace(/[ç]/g,'c');
  }

  function renderUnitButtons() {
    const container = document.getElementById('unit-buttons');
    let html = '';
    for (const [unidade, info] of Object.entries(unitMap)) {
      const actions = UNITS_DATA[unidade] || [];
      const totalMelhorias = actions.reduce((acc, a) => acc + a.qtd_melhorias, 0);
      html += `
        <div class="unit-box">
          <button class="unit-btn" id="btn-${info.key}" type="button" onclick="showUnit('${info.key}', '${unidade}')">${unidade}</button>
          <div class="unit-stats"><strong>${actions.length}</strong> ações · <strong>${totalMelhorias}</strong> melhorias</div>
        </div>
      `;
    }
    container.innerHTML = html;
  }

  function renderUnit(key, unidade) {
    const actions = UNITS_DATA[unidade] || [];
    document.getElementById(key + '-title').textContent = unidade;
    document.getElementById(key + '-info').textContent = `${actions.length} ações · ${actions.reduce((a, x) => a + x.qtd_melhorias, 0)} melhorias associadas. Clique em uma ação para ver os detalhes e melhorias vinculadas.`;
    const container = document.getElementById(key + '-actions');
    let html = '';
    actions.forEach(action => {
      const domId = `${key}-${action.id}`;
      const melhoriasHtml = action.melhorias.map(m => {
        const melhoriaId = `${unidade}-${action.idac}-${m.idm}`.replace(/[^a-zA-Z0-9_-]/g, '-');
        return `
        <tr onclick="alternarLinhaSelecionada(event, '${melhoriaId}')">
          <td class="col-select"><input type="checkbox" id="${melhoriaId}" class="check-melhoria" data-unidade="${unidade}" data-acao="${action.idac}" data-melhoria="${m.idm}" data-descricao="${m.desc.replace(/"/g, '&quot;')}" onchange="marcarLinhaSelecionada(this)"></td>
          <td class="col-id">${m.idm}</td>
          <td>${m.desc}</td>
          <td class="col-date" data-label="Início">${m.inicio}</td>
          <td class="col-prazo">${m.prazo}d</td>
          <td class="col-date" data-label="Previsão">${m.previsao}</td>
          <td><span class="status-tag ${statusClass(m.status)}">${m.status}</span></td>
        </tr>
      `;
      }).join('');

      html += `
        <button class="action-btn" onclick="toggle('${domId}')">
          <span class="action-btn-title">${action.nome}</span>
          <span class="action-meta-side">
            <small>${action.inicio} → ${action.previsao}</small>
            <span class="pill">${action.qtd_melhorias} melhorias</span>
          </span>
        </button>
        <div id="${domId}" class="action-card hidden">
          <div class="action-header">
            <h3 class="action-title">${action.nome}</h3>
            <span class="badge">${action.status}</span>
          </div>
          <div class="meta">
            <div class="meta-item"><span class="lbl">Início</span><span class="val">${action.inicio}</span></div>
            <div class="meta-item"><span class="lbl">Previsão</span><span class="val">${action.previsao}</span></div>
            <div class="meta-item"><span class="lbl">Prazo total</span><span class="val">${action.prazo}</span></div>
            <div class="meta-item"><span class="lbl">Melhorias</span><span class="val">${action.qtd_melhorias}</span></div>
          </div>
          <div class="melhorias-title">Melhorias vinculadas (${action.qtd_melhorias})</div>
          <div style="overflow-x:auto;">
            <table class="melhorias-table">
              <thead>
                <tr>
                  <th>Selecionar</th>
                  <th>ID</th>
                  <th>Descrição</th>
                  <th>Início</th>
                  <th>Prazo</th>
                  <th>Previsão</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>${melhoriasHtml}</tbody>
            </table>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function showUnit(key, unidade) {
    ['abc', 'patio', 'interlagos', 'guarulhos'].forEach(k => {
      document.getElementById(k).classList.add('hidden');
      const btn = document.getElementById('btn-' + k);
      if (btn) btn.classList.remove('active');
    });
    document.getElementById(key).classList.remove('hidden');
    document.getElementById('btn-' + key).classList.add('active');
    if (unidade) renderUnit(key, unidade);
  }

  function toggle(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('hidden');
  }

  function marcarLinhaSelecionada(checkbox) {
    const linha = checkbox.closest('tr');
    if (!linha) return;
    linha.classList.toggle('linha-selecionada', checkbox.checked);
  }

  function alternarLinhaSelecionada(event, checkboxId) {
    if (event.target.tagName.toLowerCase() === 'input') return;
    const checkbox = document.getElementById(checkboxId);
    if (!checkbox) return;
    checkbox.checked = !checkbox.checked;
    marcarLinhaSelecionada(checkbox);
  }

  // INIT
  renderUnitButtons();
  showUnit('abc', 'Grande ABC');
</script>
